<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Timetable</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        margin: 0;
        padding: 20px;
    }
    h1 {
        text-align: center;
        color: #333;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td {
        border: 1px solid #ccc;
        padding: 12px;
        text-align: center;
    }
    th {
        background-color: #4CAF50;
        color: white;
    }
    tr:nth-child(even) {
        background-color: #f9f9f9;
    }
    .subject {
        font-weight: bold;
        color: #333;
    }
    /* Responsive table */
    @media (max-width: 768px) {
        table, thead, tbody, th, td, tr {
            display: block;
        }
        th {
            position: sticky;
            top: 0;
        }
        td {
            border: none;
            border-bottom: 1px solid #ccc;
        }
    }
</style>
</head>
<body>

<h1>Weekly Timetable</h1>

<table id="timetable">
    <thead>
        <tr>
            <th>Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
        </tr>
    </thead>
    <tbody>
        <!-- Rows will be generated by JavaScript -->
    </tbody>
</table>

<script>
    // Sample timetable data
    const schedule = [
        { time: "9:00 - 10:00", mon: "Math", tue: "English", wed: "Physics", thu: "Chemistry", fri: "Biology" },
        { time: "10:00 - 11:00", mon: "English", tue: "Math", wed: "Chemistry", thu: "Biology", fri: "Physics" },
        { time: "11:00 - 12:00", mon: "Physics", tue: "Biology", wed: "Math", thu: "English", fri: "Chemistry" },
        { time: "12:00 - 1:00", mon: "Break", tue: "Break", wed: "Break", thu: "Break", fri: "Break" },
        { time: "1:00 - 2:00", mon: "Chemistry", tue: "Physics", wed: "English", thu: "Math", fri: "Biology" },
        { time: "2:00 - 3:00", mon: "Biology", tue: "Chemistry", wed: "Physics", thu: "English", fri: "Math" }
    ];

    const tbody = document.querySelector("#timetable tbody");

    // Generate timetable rows dynamically
    schedule.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row.time}</td>
            <td class="subject">${row.mon}</td>
            <td class="subject">${row.tue}</td>
            <td class="subject">${row.wed}</td>
            <td class="subject">${row.thu}</td>
            <td class="subject">${row.fri}</td>
        `;
        tbody.appendChild(tr);
    });
</script>

</body>
</html>
